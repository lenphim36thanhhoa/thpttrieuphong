<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THPT Triệu Phong K25-28</title>

<link rel="icon" href="https://i.ibb.co/j793BVJ/6842443-E-0-B01-43-D0-B7-CB-76-AEA90-C6317.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
z-index:999
}

.popup-box{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
border:1px solid #ff003c;
box-shadow:0 0 25px #ff003c
}

.popup-box button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#ff003c;
color:white;
border-radius:8px;
cursor:pointer
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:40px;
width:340px;
border-radius:20px;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
box-shadow:0 0 40px rgba(255,0,0,0.3);
margin-top:80px
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
margin:auto;
margin-bottom:15px;
background:url("https://i.ibb.co/j793BVJ/6842443-E-0-B01-43-D0-B7-CB-76-AEA90-C6317.png") center/cover;
border:2px solid #ff003c;
box-shadow:0 0 25px #ff003c
}

h1{
font-size:28px;
margin-bottom:20px;
letter-spacing:2px;
text-shadow:0 0 10px #ff003c,0 0 20px #ff003c
}

.links a{
display:block;
text-decoration:none;
color:white;
padding:12px;
margin:10px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,0,0,0.4);
transition:.3s
}

.links a:hover{
background:#ff003c;
transform:scale(1.07);
box-shadow:0 0 20px #ff003c
}

.footer{
margin-top:15px;
font-size:12px;
opacity:.7
}

.stats{
margin-top:12px;
display:flex;
justify-content:center;
gap:20px;
font-size:16px;
color:#ff003c;
text-shadow:0 0 10px #ff003c
}

.likeBtn{
cursor:pointer;
transition:.2s
}

.likeBtn:hover{
transform:scale(1.2)
}

.video-section{
width:90%;
max-width:1000px;
margin-top:40px;
z-index:2
}

.video-section h2{
text-align:center;
margin-bottom:20px;
text-shadow:0 0 10px #ff003c
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px
}

.video-card{
position:relative;
background:#111;
padding:10px;
border-radius:12px;
border:1px solid rgba(255,0,0,0.4);
box-shadow:0 0 15px rgba(255,0,0,0.2)
}

video{
width:100%;
border-radius:8px
}

.video-date{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:5px 10px;
border-radius:6px;
font-size:13px;
border:1px solid #ff003c
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff003c;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
z-index:3
}

</style>
</head>

<body>

<div class="popup" id="popup">
<div class="popup-box">
<h2>Cảm ơn vì đã xem trang của tụi em ❤️</h2>
<button onclick="startSite()">OK</button>
</div>
</div>

<canvas id="bg"></canvas>

<audio id="music" loop>
<source src="https://raw.githubusercontent.com/lenphim36thanhhoa/cbnrthfgnf/main/c%C3%B3%20h%E1%BA%B9n%20v%E1%BB%9Bi%20thanh%20xu%C3%A2n.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊 Nhạc</button>

<div class="container">

<div class="avatar"></div>

<h1>THPT Triệu Phong<br>K25-28</h1>

<div class="links">
<a href="https://www.tiktok.com/@a5thpttrieuphong0">TikTok lớp</a>
</div>

<div class="footer">bio của lớp bọn em ạ</div>

<div class="stats">
<span>👁 <span id="viewCount">0</span></span>
<span class="likeBtn" onclick="likeSite()">❤️ <span id="likeCount">0</span></span>
</div>

</div>

<div class="video-section">

<h2>Kỷ Niệm Lớp</h2>

<div class="video-grid">

<div class="video-card">
<div class="video-date">8/3/2026</div>
<video controls>
<source src="https://raw.githubusercontent.com/lenphim36thanhhoa/cbnrthfgnf/main/c%E1%BA%A3m-%C6%A1n-c%C3%A1c-b%E1%BA%A1n-zai-%C4%91%E1%BA%B9p-10a5-nh%C3%ACuuu-nh%C3%A1-a5-xuhuong.mp4">
</video>
</div>

<div class="video-card">
<div class="video-date">19/11/2025</div>
<video controls>
<source src="https://raw.githubusercontent.com/lenphim36thanhhoa/cbnrthfgnf/main/%F0%9F%8E%89%F0%9F%8E%8919-11-20-11-%E2%80%93-hai-ng_-y-th_-t-%C4%91%E1%BA%B7c-bi%E1%BB%87t-v%E1%BB%9Bi-10a5.g_-i-l%E1%BB%9Di-ch%C3%BAc-t%E1%BB%91t-%C4%91%E1%BA%B9p-nh%E1%BA%A5t-%C4%91%E1%BA%BFn-c%C3%A1c-b%E1%BA%A1n-nam-c%E1%BB%A7a-l%E1%BB%9Bp-lu%C3%B4n-m%E1%BA%A1nh-m%E1%BA%BD-t%E1%BB%B1-tin-h%E1%BB%8Dc-t%E1%BB%91t-v_-gi%E1%BB%AF-m%C3%A3i-s%E1%BB%B1-nhi.10a5-lu%C3%B4n-t%E1%BB%B1-h_-o-v%C3%AC-c%C3%B3-c%C3%B4-v_-c%C3%B3-nhau-a5-xuhuong.mp4">
</video>
</div>

</div>

</div>

<script>

const API="https://dawn-wildflower-8bce.lebaoduy0202.workers.dev"
const music=document.getElementById("music")

async function startSite(){

document.getElementById("popup").style.display="none"

music.play().catch(()=>{})

let view=await fetch(API+"?type=view").then(r=>r.json())
document.getElementById("viewCount").innerText=view.data.up_count||0

let like=await fetch(API+"?type=getlike").then(r=>r.json())
document.getElementById("likeCount").innerText=like.data.up_count||0

}

function toggleMusic(){
music.paused?music.play():music.pause()
}

async function likeSite(){

if(localStorage.getItem("liked")) return

let like=await fetch(API+"?type=like").then(r=>r.json())
document.getElementById("likeCount").innerText=like.data.up_count||0

localStorage.setItem("liked","true")

}

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,0,60,0.8)"

particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

p.y+=1
p.x+=Math.sin(p.d)

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
